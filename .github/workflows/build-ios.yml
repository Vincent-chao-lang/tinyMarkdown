name: Build iOS

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          rm -f Gemfile.lock ios/Gemfile.lock
          cd ios
          gem install bundler -v '> 2.0'
          bundle install
          pod install

      - name: Build iOS (Debug)
        run: |
          xcodebuild \
            -workspace ios/tinyMarkdown.xcworkspace \
            -scheme tinyMarkdown \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=Any iOS Simulator Device' \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      # 仅在 tag 推送时构建 Release 版本
      - name: Build iOS (Release)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          xcodebuild \
            -workspace ios/tinyMarkdown.xcworkspace \
            -scheme tinyMarkdown \
            -configuration Release \
            -sdk iphoneos \
            clean build \
            CODE_SIGNING_ALLOWED=NO

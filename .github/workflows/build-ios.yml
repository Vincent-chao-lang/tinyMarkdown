name: Build iOS

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Install CocoaPods
        run: |
          rm -f Gemfile.lock ios/Gemfile.lock
          cd ios
          gem install bundler -v '> 2.0'
          bundle install
          pod install

      - name: Build iOS (Release)
        run: |
          xcodebuild \
            -workspace ios/tinyMarkdown.xcworkspace \
            -scheme tinyMarkdown \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ios/build \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      - name: Package iOS (.ipa)
        run: |
          # 查找构建输出的 .app 文件
          find ios/build -name "tinyMarkdown.app" -type d
          APP_PATH=$(find ios/build -name "tinyMarkdown.app" -type d | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: tinyMarkdown.app not found"
            exit 1
          fi

          echo "Found app at: $APP_PATH"

          # 创建 .ipa 包结构
          mkdir -p /tmp/ipa-build/Payload
          cp -R "$APP_PATH" /tmp/ipa-build/Payload/

          # 打包为 .ipa
          cd /tmp/ipa-build
          zip -r /tmp/tinyMarkdown-ios.ipa .

          echo "✅ .ipa file created successfully"
          ls -lh /tmp/tinyMarkdown-ios.ipa

      - name: Upload iOS Release
        uses: actions/upload-artifact@v4
        with:
          name: tinyMarkdown-ios
          path: /tmp/tinyMarkdown-ios.ipa
          retention-days: 90
